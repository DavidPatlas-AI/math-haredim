function render(){
  const G=document.getElementById('tipsGrid');G.innerHTML='';
  const filtered=curCat==='all'?TIPS:TIPS.filter(t=>t.cat===curCat);
  filtered.forEach((t,i)=>{
    const c=document.createElement('div');c.className='tip-card';
    const realIdx=TIPS.indexOf(t)+1;
    c.innerHTML='<div class="num">'+realIdx+'</div><span class="icon">'+t.icon+'</span><div class="title">'+t.title+'</div><div class="hint">לחצו לקרוא את הטיפ ↓</div><div class="body">'+t.body+'<div class="close">▲ סגור</div></div>';
    c.onclick=function(e){
      if(e.target.classList.contains('close')){c.classList.remove('open');return;}
      if(!c.classList.contains('open')){
        document.querySelectorAll('.tip-card.open').forEach(x=>x.classList.remove('open'));
        c.classList.add('open');
        setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'center'}),50);
      }
    };
    G.appendChild(c);
  });
}
document.querySelectorAll('#catPick button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('#catPick button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curCat=b.dataset.c;render();};});
render();
</script>
<script src="../shared/nav.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}</script>
</body>
