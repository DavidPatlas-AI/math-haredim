<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="description" content="כלי גרפים GeoGebra — ציור גרפים, פונקציות וגיאומטריה. מתמטיקה לחרדים.">
<link rel="stylesheet" href="/shared/style.css">
<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark")}catch(e){}</script>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#2b3a32"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="מת׳ לחרדים"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כלי גרפים — GeoGebra | מתמטיקה לחרדים</title>
<script src="https://www.geogebra.org/apps/deployggb.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap');

  :root {
    --board:#2b3a32; --board-dark:#1e2b23; --board-light:#374d3e;
    --chalk:#f4f1ea; --chalk-dim:rgba(244,241,234,.6); --chalk-faint:rgba(244,241,234,.12);
    --chalk-y:#ffe66d; --chalk-b:#74b9ff; --chalk-g:#55efc4; --chalk-r:#ff7675; --chalk-p:#a29bfe;
    --wood:#7a5410; --wood-hi:#c4922a; --wood-dk:#4a3008;
    --line:rgba(244,241,234,.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; height:100%; }

  body {
    font-family:'Heebo',sans-serif; color:var(--chalk);
    min-height:100vh; display:flex; flex-direction:column;
    background:
      radial-gradient(ellipse 70% 40% at 20% 0%, rgba(255,230,109,.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 100%, rgba(116,185,255,.05) 0%, transparent 60%),
      var(--board);
  }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:9998;
    border:10px solid var(--wood);
    box-shadow:inset 0 0 0 1px var(--wood-hi), inset 0 0 0 3px rgba(0,0,0,.45), inset 0 0 40px rgba(0,0,0,.12);
  }

  /* ── TOP BAR ── */
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 24px;
    background:rgba(20,32,25,.9);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,230,109,.12);
    box-shadow:0 4px 24px rgba(0,0,0,.3);
    flex-shrink:0; gap:12px;
  }
  .back-link {
    display:inline-flex; align-items:center; gap:7px;
    color:var(--chalk-y); text-decoration:none;
    font-weight:700; font-size:.85rem;
    padding:7px 15px; border-radius:20px;
    border:1px solid rgba(255,230,109,.2);
    background:rgba(255,230,109,.07);
    transition:.2s; white-space:nowrap;
  }
  .back-link:hover { background:rgba(255,230,109,.14); transform:translateX(3px); }
  .topbar-center {
    flex:1; text-align:center; min-width:0;
  }
  .page-title {
    font-family:'Frank Ruhl Libre',serif; font-size:1.05rem; font-weight:900;
    color:var(--chalk); letter-spacing:.2px;
  }
  .page-sub { font-size:.7rem; color:var(--chalk-dim); }
  .fullscreen-btn {
    display:inline-flex; align-items:center; gap:6px;
    color:var(--chalk-dim); text-decoration:none;
    font-weight:600; font-size:.82rem;
    padding:7px 14px; border-radius:20px;
    border:1px solid var(--line);
    background:rgba(244,241,234,.05);
    cursor:pointer; transition:.2s; white-space:nowrap;
    font-family:'Heebo',sans-serif;
  }
  .fullscreen-btn:hover { border-color:var(--chalk-b); color:var(--chalk-b); background:rgba(116,185,255,.08); }

  /* ── EXAMPLES PANEL ── */
  .examples-panel {
    background:rgba(255,230,109,.04);
    border-bottom:1px solid var(--line);
    padding:12px 20px;
    flex-shrink:0;
  }
  .examples-label {
    font-size:.68rem; font-weight:800; letter-spacing:1.5px;
    color:var(--chalk-y); text-transform:uppercase; margin-bottom:9px;
    opacity:.8;
  }
  .examples-scroll {
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .ex-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 13px; border-radius:99px;
    border:1px solid var(--line);
    background:rgba(244,241,234,.05);
    color:var(--chalk-dim); font-size:.78rem; font-weight:600;
    cursor:pointer; transition:.2s;
    font-family:'Heebo',sans-serif;
    direction:ltr;
  }
  .ex-btn:hover { border-color:var(--chalk-y); color:var(--chalk-y); background:rgba(255,230,109,.08); }
  .ex-btn.active { border-color:var(--chalk-y); color:var(--chalk-y); background:rgba(255,230,109,.12); }
  .ex-cat {
    font-size:.65rem; font-weight:800; letter-spacing:.5px;
    color:var(--chalk-dim); opacity:.5; align-self:center;
    white-space:nowrap; direction:rtl;
  }

  /* ── MAIN AREA ── */
  .main-area {
    flex:1; display:flex; flex-direction:column;
    padding:14px 16px 0; min-height:0;
  }
  #ggb-container {
    flex:1; min-height:580px;
    border-radius:12px; overflow:hidden;
    border:1px solid rgba(255,230,109,.15);
    box-shadow:0 8px 40px rgba(0,0,0,.4);
    background:#fff;
  }

  /* ── TIPS ROW ── */
  .tips-row {
    display:flex; gap:8px; flex-wrap:wrap;
    padding:12px 16px 16px; flex-shrink:0;
  }
  .tip-chip {
    font-size:.75rem; color:var(--chalk-dim);
    background:rgba(244,241,234,.04);
    border:1px solid var(--line); border-radius:99px;
    padding:5px 12px; direction:ltr;
  }
  .tip-chip b { color:var(--chalk-y); font-weight:700; }
  .tips-label {
    font-size:.72rem; color:var(--chalk-dim); opacity:.55;
    align-self:center; direction:rtl; white-space:nowrap;
  }

  /* ── FOOTER ── */
  .chalk-footer {
    text-align:center; font-size:.7rem; color:rgba(244,241,234,.25);
    padding:10px 16px 22px; flex-shrink:0; letter-spacing:.3px;
  }

  /* ── FULLSCREEN MODE ── */
  body.is-fullscreen .examples-panel { display:none; }
  body.is-fullscreen .tips-row { display:none; }
  body.is-fullscreen .main-area { padding:0; }
  body.is-fullscreen #ggb-container { border-radius:0; border:none; min-height:calc(100vh - 58px); }
  body.is-fullscreen .chalk-footer { display:none; }

  @media(max-width:640px) {
    .topbar { padding:10px 14px; }
    .page-title { font-size:.92rem; }
    #ggb-container { min-height:450px; }
    .ex-cat { display:none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<nav class="topbar">
  <a href="/" class="back-link">← בית</a>
  <div class="topbar-center">
    <div class="page-title">📈 כלי גרפים — GeoGebra</div>
    <div class="page-sub">ציירו פונקציות, משוואות וצורות גיאומטריות</div>
  </div>
  <button class="fullscreen-btn" id="fs-btn" onclick="toggleFullscreen()">⛶ מסך מלא</button>
</nav>

<!-- EXAMPLES PANEL -->
<div class="examples-panel">
  <div class="examples-label">דוגמאות מוכנות — לחצו להכנסה לגרף</div>
  <div class="examples-scroll">

    <span class="ex-cat">קו ישר</span>
    <button class="ex-btn" data-expr="y = 2x + 1">y = 2x + 1</button>
    <button class="ex-btn" data-expr="y = -x + 3">y = -x + 3</button>

    <span class="ex-cat">פרבולה</span>
    <button class="ex-btn" data-expr="y = x^2">y = x²</button>
    <button class="ex-btn" data-expr="y = x^2 - 4x + 3">y = x²−4x+3</button>
    <button class="ex-btn" data-expr="y = -x^2 + 2x + 3">y = −x²+2x+3</button>

    <span class="ex-cat">שורש</span>
    <button class="ex-btn" data-expr="y = sqrt(x)">y = √x</button>
    <button class="ex-btn" data-expr="y = sqrt(x - 1) + 2">y = √(x−1)+2</button>

    <span class="ex-cat">מעגל</span>
    <button class="ex-btn" data-expr="x^2 + y^2 = 25">x²+y²=25</button>
    <button class="ex-btn" data-expr="(x-2)^2 + (y-1)^2 = 9">(x−2)²+(y−1)²=9</button>

    <span class="ex-cat">שני גרפים</span>
    <button class="ex-btn" data-expr="pair" data-pair='["y = x^2 - 2x - 3","y = x + 1"]'>פרבולה ∩ קו</button>

  </div>
</div>

<!-- GEOGEBRA -->
<div class="main-area">
  <div id="ggb-container"></div>
</div>

<!-- TIPS -->
<div class="tips-row">
  <span class="tips-label">טיפים:</span>
  <div class="tip-chip"><b>^</b> לחזקה</div>
  <div class="tip-chip"><b>sqrt(x)</b> לשורש</div>
  <div class="tip-chip"><b>abs(x)</b> לערך מוחלט</div>
  <div class="tip-chip"><b>Enter</b> לאחר הקלדה</div>
  <div class="tip-chip">גלגלת עכבר = זום</div>
</div>

<footer class="chalk-footer">
  מתמטיקה לחרדים · כלי גרפים GeoGebra · הכנה למה״ט ולבגרות 3 יח״ל
</footer>

<script>
  var ggbApp = null;

  function buildParams() {
    var cont = document.getElementById("ggb-container");
    var h = Math.max(580, window.innerHeight - 240);
    return {
      appName: "graphing",
      language: "he",
      width: cont.offsetWidth || 900,
      height: h,
      showToolBar: true,
      showAlgebraInput: true,
      showMenuBar: true,
      enableRightClick: false,
      showResetIcon: true,
      enableLabelDrags: true,
      useBrowserForJS: false,
      allowStyleBar: true,
      preventFocus: false,
      showZoomButtons: true,
      enableFileFeatures: false,
      appletOnLoad: function() {
        document.getElementById("ggb-container").style.opacity = "1";
      }
    };
  }

  window.addEventListener("load", function() {
    var cont = document.getElementById("ggb-container");
    cont.style.opacity = "0";
    cont.style.transition = "opacity .4s";
    var h = Math.max(580, window.innerHeight - 240);
    cont.style.height = h + "px";

    ggbApp = new GGBApplet(buildParams(), true);
    ggbApp.inject("ggb-container");
  });

  // Resize height
  window.addEventListener("resize", function() {
    var cont = document.getElementById("ggb-container");
    var h = document.body.classList.contains("is-fullscreen")
      ? window.innerHeight - 58
      : Math.max(580, window.innerHeight - 240);
    cont.style.height = h + "px";
  });

  // Example buttons
  document.querySelectorAll(".ex-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".ex-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");

      if (!ggbApp) return;
      var api = window.ggbApplet;
      if (!api) return;

      api.reset();

      if (btn.dataset.expr === "pair") {
        var exprs = JSON.parse(btn.dataset.pair);
        exprs.forEach(function(e){ api.evalCommand(e); });
      } else {
        api.evalCommand(btn.dataset.expr);
      }
    });
  });

  // Fullscreen toggle
  function toggleFullscreen() {
    var body = document.body;
    var btn = document.getElementById("fs-btn");
    if (body.classList.contains("is-fullscreen")) {
      body.classList.remove("is-fullscreen");
      btn.textContent = "⛶ מסך מלא";
    } else {
      body.classList.add("is-fullscreen");
      btn.textContent = "✕ יציאה";
    }
    // trigger resize
    setTimeout(function(){ window.dispatchEvent(new Event("resize")); }, 50);
  }
</script>

<script src="/shared/nav.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){})})}</script>
</body>
</html>
