<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
<meta name="description" content="קרב מתמטיקה כיתתי — הכנה למה״ט ולבגרות 3 יח״ל. מתמטיקה לחרדים.">
<link rel="stylesheet" href="/shared/style.css">
<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark")}catch(e){}</script>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#12142a"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="מת׳ לחרדים"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קרב מתמטיקה כיתתי</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;800;900&family=Frank+Ruhl+Libre:wght@500;700;900&display=swap');
        :root {
            --ink: #1a1a2e;
            --bg: #f8f6f0;
            --card: #fff;
            --line: #d5d0c8;
            --shadow: 0 8px 25px rgba(26, 26, 46, .10);
            --gold: #c9a227;
            --red: #c0392b;
            --blue: #1e6091;
            --green: #2d6a4f;
            --purple: #6b3fa0;
            --orange: #d97706;
            --pink: #e91e63;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Heebo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            background: radial-gradient(circle at 20% 10%, rgba(201, 162, 39, .06), transparent 50%),
                radial-gradient(circle at 80% 90%, rgba(30, 96, 145, .06), transparent 50%),
                var(--bg);
            padding: 16px;
        }
        .wrap { max-width: 900px; margin: 0 auto; }

        /* HEADER */
        header {
            text-align: center;
            padding: 20px;
            background: var(--card);
            border: 2px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 2rem; }
        header .sub { color: #666; font-size: .9rem; }

        /* SCREENS */
        .screen { display: none; }
        .screen.active { display: block; }

        /* JOIN SCREEN */
        .join-box {
            background: var(--card);
            border: 2px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .qr-sim {
            width: 140px;
            height: 140px;
            margin: 12px auto;
            background: repeating-linear-gradient(0deg, #000 0px, #000 8px, #fff 8px, #fff 16px),
                repeating-linear-gradient(90deg, #000 0px, #000 8px, #fff 8px, #fff 16px);
            border: 3px solid #000;
            border-radius: 12px;
            position: relative;
        }
        .qr-sim::after {
            content: "📱";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            background: #fff;
            padding: 8px;
            border-radius: 8px;
        }
        .code-display {
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--blue);
            margin: 8px 0;
        }
        .player-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 12px 0;
        }
        .player-inputs input {
            font-family: 'Heebo';
            font-size: 1rem;
            padding: 8px 12px;
            border: 2px solid var(--line);
            border-radius: 8px;
            text-align: center;
            width: 110px;
        }
        .btn {
            font-family: 'Heebo';
            font-weight: 700;
            font-size: 1rem;
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: .2s;
            color: #fff;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-start { background: var(--green); font-size: 1.2rem; padding: 14px 36px; }
        .btn-add { background: var(--blue); }

        /* GAME SCREEN */
        .game-layout { display: grid; grid-template-columns: 1fr 280px; gap: 14px; }
        @media (max-width: 700px) { .game-layout { grid-template-columns: 1fr; } }

        .main-area {
            background: var(--card);
            border: 2px solid var(--line);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .turn-banner {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 14px;
        }
        .question-box {
            text-align: center;
            font-family: 'Frank Ruhl Libre', serif;
            font-size: 1.4rem;
            font-weight: 900;
            direction: ltr;
            padding: 18px;
            background: var(--bg);
            border-radius: 14px;
            margin-bottom: 14px;
        }
        .opts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .opts-grid button {
            font-family: 'Heebo';
            font-size: 1.05rem;
            font-weight: 700;
            padding: 14px;
            border: 2px solid var(--line);
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: .15s;
        }
        .opts-grid button:hover { transform: translateY(-2px); }
        .opts-grid button.correct { background: var(--green); color: #fff; border-color: var(--green); }
        .opts-grid button.incorrect { background: var(--red); color: #fff; border-color: var(--red); }
        .feedback-msg {
            text-align: center;
            font-weight: 700;
            min-height: 26px;
            margin-top: 10px;
            font-size: 1rem;
        }

        /* TREASURE BOX */
        .treasure-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .treasure-overlay.show { display: flex; }
        .treasure-box {
            background: #fff;
            border: 3px solid var(--gold);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .3);
            animation: pop .35s ease;
        }
        @keyframes pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .treasure-box h2 { font-family: 'Frank Ruhl Libre', serif; }
        .treasure-box .options { display: grid; gap: 8px; margin-top: 12px; }
        .treasure-box .options button {
            font-family: 'Heebo';
            font-weight: 700;
            font-size: 1rem;
            padding: 12px;
            border: 2px solid var(--line);
            border-radius: 10px;
            cursor: pointer;
            transition: .15s;
            background: #fff;
        }
        .treasure-box .options button:hover { transform: scale(1.03); }

        /* SIDEBAR */
        .sidebar {
            background: var(--card);
            border: 2px solid var(--line);
            border-radius: 18px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .sidebar h3 { font-family: 'Frank Ruhl Libre', serif; text-align: center; margin-bottom: 10px; }
        .player-score {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 6px;
            transition: .2s;
            font-weight: 600;
        }
        .player-score.active-player { background: rgba(201, 162, 39, .2); border: 2px solid var(--gold); }
        .player-score .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            font-weight: 900;
            flex-shrink: 0;
        }
        .player-score .name { flex: 1; }
        .player-score .pts { font-family: 'Frank Ruhl Libre', serif; font-size: 1.3rem; font-weight: 900; }
        .log-box {
            margin-top: 12px;
            background: var(--bg);
            border-radius: 10px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: .8rem;
        }
        .log-box div { padding: 2px 0; border-bottom: 1px solid var(--line); }

        .btn-next { display: none; margin: 14px auto 0; background: var(--blue); }
        footer { text-align: center; font-size: .75rem; color: #999; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>⚔️ קרב מתמטיקה כיתתי</h1>
            <div class="sub">סרקו את קוד ה-QR, הצטרפו, וענו נכון — אבל שימו לב: תיבות הפתעה יכולות לשנות הכול!</div>
        </header>

        <!-- JOIN SCREEN -->
        <div id="joinScreen" class="screen active">
            <div class="join-box">
                <h2>📱 הצטרפו למשחק</h2>
                <div class="qr-sim"></div>
                <div class="code-display" id="roomCode">MAT42</div>
                <p style="font-size:.9rem;color:#666">סרקו את הקוד או הזינו את הקוד במכשיר שלכם</p>
                <p style="margin-top:8px;font-weight:700">או — שחקו על אותו מסך:</p>
                <div class="player-inputs" id="playerInputs">
                    <input type="text" placeholder="שחקן 1" value="אלון" id="p1name">
                    <input type="text" placeholder="שחקן 2" value="מיכל" id="p2name">
                    <input type="text" placeholder="שחקן 3" value="יוסי" id="p3name">
                    <input type="text" placeholder="שחקן 4" id="p4name">
                </div>
                <button class="btn btn-add" onclick="addPlayerInput()">+ הוסף שחקן</button>
                <br><br>
                <button class="btn btn-start" onclick="startGame()">🚀 התחילו קרב!</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="screen">
            <div class="game-layout">
                <div class="main-area">
                    <div class="turn-banner" id="turnBanner"></div>
                    <div class="question-box" id="questionBox"></div>
                    <div class="opts-grid" id="optsGrid"></div>
                    <div class="feedback-msg" id="feedbackMsg"></div>
                    <button class="btn btn-next" id="nextBtn" onclick="nextTurn()">⏭️ הבא בתור</button>
                </div>
                <div class="sidebar">
                    <h3>🏆 לוח ניקוד</h3>
                    <div id="scoreboard"></div>
                    <div class="log-box" id="logBox"><div style="color:#999">📜 יומן אירועים...</div></div>
                </div>
            </div>
        </div>

        <!-- TREASURE OVERLAY -->
        <div class="treasure-overlay" id="treasureOverlay">
            <div class="treasure-box" id="treasureBox"></div>
        </div>

        <footer>⚔️ קרב מתמטיקה כיתתי · ענו, גנבו, נצחו!</footer>
    </div>

    <script>
        // ===== STATE =====
        let players = [];
        let currentPlayer = 0;
        let currentQuestion = null;
        let questionLocked = false;
        let gameLog = [];

        const COLORS = ['#e91e63', '#1e6091', '#d97706', '#2d6a4f', '#6b3fa0', '#c0392b'];
        const AVATARS = ['🦊', '🐸', '🐼', '🦁', '🐨', '🦉', '🐯', '🐙'];

        // ===== QUESTION POOL (all topics) =====
        const ALL_QUESTIONS = [
            // אלגברה
            { q: "(x+3)² = ?", opts: ["x²+6x+9", "x²+9", "x²+3x+9", "x²−6x+9"], ans: 0, topic: "כפל מקוצר" },
            { q: "(x−4)² = ?", opts: ["x²−8x+16", "x²−16", "x²+8x+16", "x²−8x−16"], ans: 0, topic: "כפל מקוצר" },
            { q: "(x+5)(x−5) = ?", opts: ["x²−25", "x²+25", "x²−10x+25", "x²+10x+25"], ans: 0, topic: "כפל מקוצר" },
            { q: "פרקו: x²−9", opts: ["(x+3)(x−3)", "(x−3)²", "x(x−9)", "לא ניתן"], ans: 0, topic: "פירוק לגורמים" },
            { q: "פרקו: x²+7x+12", opts: ["(x+3)(x+4)", "(x+2)(x+6)", "(x+1)(x+12)", "(x−3)(x−4)"], ans: 0, topic: "פירוק לגורמים" },
            { q: "תחום הגדרה: 1/(x−2)", opts: ["x≠2", "x>2", "x≥2", "x<2"], ans: 0, topic: "תחום הגדרה" },
            { q: "תחום הגדרה: √(x+4)", opts: ["x≥−4", "x>−4", "x≤−4", "x≠−4"], ans: 0, topic: "תחום הגדרה" },
            { q: "פתרון: 2x²−8=0", opts: ["x=±2", "x=2", "x=±4", "x=0"], ans: 0, topic: "משוואה ריבועית" },
            { q: "−3x < 9 → x ?", opts: ["x > −3", "x < −3", "x > 3", "x < 3"], ans: 0, topic: "אי-שוויונות" },
            // פונקציות
            { q: "y=x²−6x+5 — x קודקוד?", opts: ["3", "−3", "6", "−6"], ans: 0, topic: "פרבולה" },
            { q: "y=2x²−8x+1 — x קודקוד?", opts: ["2", "−2", "4", "−4"], ans: 0, topic: "פרבולה" },
            { q: "אם a<0 בפרבולה, היא:", opts: ["עצובה ∩", "מחייכת ∪", "ישרה", "לא מוגדרת"], ans: 0, topic: "פרבולה" },
            // גיאומטריה
            { q: "משולש ישר-זווית ניצבים 3,4 — יתר?", opts: ["5", "7", "6", "√7"], ans: 0, topic: "פיתגורס" },
            { q: "sin 30° = ?", opts: ["0.5", "√3/2", "1", "√2/2"], ans: 0, topic: "טריגונומטריה" },
            { q: "שטח מעגל רדיוס 4?", opts: ["16π", "8π", "4π", "32π"], ans: 0, topic: "מעגל" },
            { q: "היקף מעגל רדיוס 7?", opts: ["14π", "7π", "49π", "21π"], ans: 0, topic: "מעגל" },
            { q: "שטח טרפז בסיסים 5,9 גובה 4?", opts: ["28", "56", "14", "20"], ans: 0, topic: "שטחים" },
            { q: "שטח משולש בסיס 10 גובה 6?", opts: ["30", "60", "16", "15"], ans: 0, topic: "שטחים" },
            { q: "זווית מרכזית=80°, היקפית על אותה קשת?", opts: ["40°", "80°", "160°", "20°"], ans: 0, topic: "זוויות במעגל" },
            { q: "זווית היקפית על קוטר = ?", opts: ["90°", "180°", "45°", "60°"], ans: 0, topic: "זוויות במעגל" },
            { q: "דמיון: k=3, יחס שטחים?", opts: ["9", "3", "6", "1.5"], ans: 0, topic: "דמיון" },
            // נושאים נוספים
            { q: "a₁=2, d=5 — a₄ = ?", opts: ["17", "22", "7", "12"], ans: 0, topic: "טור חשבוני" },
            { q: "סכום 1 עד 10?", opts: ["55", "45", "50", "60"], ans: 0, topic: "טור חשבוני" },
            { q: "ממוצע: 4,6,8,10?", opts: ["7", "6", "8", "28"], ans: 0, topic: "סטטיסטיקה" },
            { q: "חציון: 2,3,5,7,9?", opts: ["5", "3", "7", "6"], ans: 0, topic: "סטטיסטיקה" },
            { q: "P(זוגי) בהטלת קובייה?", opts: ["1/2", "1/6", "1/3", "2/3"], ans: 0, topic: "הסתברות" },
            { q: "s=v·t. v=60, t=3 — s=?", opts: ["180", "20", "63", "120"], ans: 0, topic: "תנועה" },
            { q: "ברז ממלא ב-6 ש' — קצב?", opts: ["1/6", "6", "1/3", "2/3"], ans: 0, topic: "הספק" },
        ];

        // ===== FUNCTIONS =====
        function addPlayerInput() {
            const container = document.getElementById('playerInputs');
            const n = container.querySelectorAll('input').length + 1;
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.placeholder = 'שחקן ' + n;
            inp.id = 'p' + n + 'name';
            container.appendChild(inp);
        }

        function startGame() {
            players = [];
            const inputs = document.querySelectorAll('#playerInputs input');
            inputs.forEach((inp, i) => {
                const name = inp.value.trim() || ('שחקן ' + (i + 1));
                players.push({
                    name: name,
                    score: 0,
                    color: COLORS[i % COLORS.length],
                    avatar: AVATARS[i % AVATARS.length],
                    frozen: false,
                });
            });
            if (players.length < 2) { alert('צריך לפחות 2 שחקנים!'); return; }
            currentPlayer = 0;
            gameLog = [];
            document.getElementById('joinScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            updateScoreboard();
            loadQuestion();
        }

        function updateScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = players.map((p, i) => {
                let cls = '';
                if (i === currentPlayer) cls = 'active-player';
                if (p.frozen) cls += ' frozen';
                return `<div class="player-score ${cls}">
                    <div class="avatar" style="background:${p.color}">${p.avatar}</div>
                    <div class="name">${p.name}${p.frozen ? ' ❄️' : ''}</div>
                    <div class="pts">${p.score}</div>
                </div>`;
            }).join('');
            const logBox = document.getElementById('logBox');
            logBox.innerHTML = gameLog.slice(-8).reverse().map(l => `<div>${l}</div>`).join('') || '<div style="color:#999">📜 יומן אירועים...</div>';
        }

        function loadQuestion() {
            questionLocked = false;
            document.getElementById('feedbackMsg').textContent = '';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('optsGrid').innerHTML = '';
            const q = ALL_QUESTIONS[Math.floor(Math.random() * ALL_QUESTIONS.length)];
            currentQuestion = q;
            document.getElementById('questionBox').textContent = q.q;
            const tb = document.getElementById('turnBanner');
            const p = players[currentPlayer];
            tb.textContent = '🎯 תורו של ' + p.name + (p.frozen ? ' ❄️ (מוקפא — מדלגים)' : '');
            tb.style.background = p.color + '22';
            tb.style.border = '2px solid ' + p.color;
            if (p.frozen) {
                document.getElementById('feedbackMsg').textContent = '❄️ ' + p.name + ' מוקפא! מפסיד תור...';
                questionLocked = true;
                addLog('❄️ ' + p.name + ' דילג תור (מוקפא)');
                setTimeout(() => {
                    players[currentPlayer].frozen = false;
                    currentPlayer = (currentPlayer + 1) % players.length;
                    updateScoreboard();
                    loadQuestion();
                }, 1500);
                return;
            }
            const optsDiv = document.getElementById('optsGrid');
            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.addEventListener('click', () => handleAnswer(i, btn));
                optsDiv.appendChild(btn);
            });
        }

        function handleAnswer(idx, btn) {
            if (questionLocked) return;
            questionLocked = true;
            const q = currentQuestion;
            const p = players[currentPlayer];
            const allBtns = document.querySelectorAll('#optsGrid button');
            allBtns.forEach(b => b.style.pointerEvents = 'none');
            if (idx === q.ans) {
                btn.classList.add('correct');
                p.score += 10;
                document.getElementById('feedbackMsg').textContent = '✅ נכון! +10 נקודות! 🎁 פתחו תיבת הפתעה!';
                document.getElementById('feedbackMsg').style.color = 'var(--green)';
                addLog('✅ ' + p.name + ' ענה נכון (+10)');
                updateScoreboard();
                setTimeout(openTreasure, 800);
            } else {
                btn.classList.add('incorrect');
                allBtns[q.ans].classList.add('correct');
                document.getElementById('feedbackMsg').textContent = '❌ טעות! התשובה: ' + q.opts[q.ans];
                document.getElementById('feedbackMsg').style.color = 'var(--red)';
                addLog('❌ ' + p.name + ' טעה');
                document.getElementById('nextBtn').style.display = 'inline-block';
            }
        }

        function openTreasure() {
            const overlay = document.getElementById('treasureOverlay');
            const box = document.getElementById('treasureBox');
            const p = players[currentPlayer];
            const actions = [
                { text: '💰 קח 5 נקודות ממישהו', icon: '💰', action: 'steal' },
                { text: '🎁 קבל 5 נקודות בונוס', icon: '🎁', action: 'bonus' },
                { text: '❄️ הקפא שחקן אחר לסיבוב', icon: '❄️', action: 'freeze' },
                { text: '🔄 החלף ניקוד עם מישהו', icon: '🔄', action: 'swap' },
                { text: '🛡️ חסינות — לא ניתן לגנוב ממך 2 סיבובים', icon: '🛡️', action: 'shield' },
                { text: '💣 איבדת 3 נקודות (סיכון!)', icon: '💣', action: 'bomb' },
            ];
            const chosen = actions[Math.floor(Math.random() * actions.length)];
            box.innerHTML = `
                <h2>🎁 תיבת הפתעה!</h2>
                <p style="font-size:1.1rem;margin:8px 0">${p.name}, קיבלת:</p>
                <p style="font-size:1.3rem;font-weight:900;color:var(--gold)">${chosen.icon} ${chosen.text}</p>
                <div class="options" id="treasureOptions"></div>
                <button class="btn" style="background:#888;margin-top:8px" onclick="closeTreasure()">סגור</button>
            `;
            overlay.classList.add('show');
            const optDiv = document.getElementById('treasureOptions');
            if (chosen.action === 'steal') {
                const targets = players.filter((pl, i) => i !== currentPlayer && pl.score > 0);
                if (targets.length === 0) {
                    optDiv.innerHTML = '<p>אין ממי לגנוב...</p>';
                } else {
                    targets.forEach(t => {
                        const b = document.createElement('button');
                        b.textContent = '💰 גנוב מ-' + t.name + ' (יש ' + t.score + ')';
                        b.addEventListener('click', () => { t.score = Math.max(0, t.score - 5); p.score += 5; addLog('💰 ' + p.name + ' גנב 5 מ-' + t.name); updateScoreboard(); closeTreasure(); });
                        optDiv.appendChild(b);
                    });
                }
            } else if (chosen.action === 'bonus') {
                p.score += 5;
                addLog('🎁 ' + p.name + ' קיבל בונוס +5');
                updateScoreboard();
                setTimeout(closeTreasure, 1000);
            } else if (chosen.action === 'freeze') {
                const targets = players.filter((pl, i) => i !== currentPlayer && !pl.frozen);
                if (targets.length === 0) {
                    optDiv.innerHTML = '<p>כולם כבר מוקפאים...</p>';
                } else {
                    targets.forEach(t => {
                        const b = document.createElement('button');
                        b.textContent = '❄️ הקפא את ' + t.name;
                        b.addEventListener('click', () => { t.frozen = true; addLog('❄️ ' + p.name + ' הקפיא את ' + t.name); updateScoreboard(); closeTreasure(); });
                        optDiv.appendChild(b);
                    });
                }
            } else if (chosen.action === 'swap') {
                const targets = players.filter((pl, i) => i !== currentPlayer);
                targets.forEach(t => {
                    const b = document.createElement('button');
                    b.textContent = '🔄 החלף עם ' + t.name + ' (יש ' + t.score + ')';
                    b.addEventListener('click', () => { const tmp = p.score; p.score = t.score; t.score = tmp; addLog('🔄 ' + p.name + ' החליף ניקוד עם ' + t.name); updateScoreboard(); closeTreasure(); });
                    optDiv.appendChild(b);
                });
            } else if (chosen.action === 'shield') {
                p.shield = 2;
                addLog('🛡️ ' + p.name + ' קיבל חסינות ל-2 סיבובים');
                updateScoreboard();
                setTimeout(closeTreasure, 1200);
            } else if (chosen.action === 'bomb') {
                p.score = Math.max(0, p.score - 3);
                addLog('💣 ' + p.name + ' איבד 3 נקודות');
                updateScoreboard();
                setTimeout(closeTreasure, 1200);
            }
        }

        function closeTreasure() {
            document.getElementById('treasureOverlay').classList.remove('show');
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        function nextTurn() {
            currentPlayer = (currentPlayer + 1) % players.length;
            updateScoreboard();
            loadQuestion();
        }

        function addLog(msg) { gameLog.push('🕐 ' + msg); updateScoreboard(); }

        // Initialize
        document.getElementById('roomCode').textContent = 'MAT' + Math.floor(Math.random() * 900 + 100);
    </script>
<script src="../shared/nav.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}</script>
</body>
</html>
