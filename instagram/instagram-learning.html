<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>מתמטיקה לחרדים · מסלול אינסטגרם</title>
<link rel="stylesheet" href="instagram-app.css">
</head>
<body>
<div class="ig-shell">
  <header class="ig-topbar">
    <span class="ig-logo">Instagram</span>
    <div class="ig-topbar-icons">
      <button title="פעילות" aria-label="פעילות">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button title="הודעות" aria-label="הודעות">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
      </button>
    </div>
  </header>

  <div class="ig-stories" id="storiesRow"></div>

  <main class="ig-feed" id="feed"></main>

  <nav class="ig-bottomnav">
    <button title="בית"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></button>
    <button title="חיפוש"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg></button>
    <button title="מסלול חדש"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/></svg></button>
    <button title="פעילות"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
    <button title="הפרופיל שלי"><span class="ig-nav-avatar" id="navAvatar"></span></button>
  </nav>
</div>

<div class="ig-story-modal" id="storyModal">
  <div class="ig-story-stage" id="storyStage">
    <div class="ig-story-bars" id="storyBars"></div>
    <div class="ig-story-head">
      <img id="storyAvatar" alt="">
      <b id="storyUser"></b>
      <span id="storyTime">עכשיו</span>
      <button class="ig-story-close" id="storyClose" aria-label="סגור">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
    <div class="ig-story-media"><img id="storyImg" alt=""></div>
    <button class="ig-story-hit ig-story-hit-prev" id="storyPrev" aria-label="הקודם"></button>
    <button class="ig-story-hit ig-story-hit-next" id="storyNext" aria-label="הבא"></button>
    <a class="ig-story-learn" id="storyLearnBtn" href="#">פתחו את השיעור המלא</a>
    <div class="ig-story-reply">
      <input type="text" placeholder="שלחו הודעה..." aria-label="שלחו הודעה">
      <button aria-label="שליחה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg></button>
    </div>
  </div>
</div>

<div class="ig-comments-modal" id="commentsModal" hidden>
  <div class="ig-comments-sheet" role="dialog" aria-modal="true" aria-labelledby="commentsTitle">
    <div class="ig-comments-head">
      <b id="commentsTitle">תגובות</b>
      <button class="ig-comments-close" id="commentsClose" aria-label="סגור">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>
      </button>
    </div>
    <div class="ig-comments-list" id="commentsList"></div>
    <a class="ig-comments-cta" id="commentsChatLink" href="#">המשיכו לדבר על הפרק בשיחה ›</a>
  </div>
</div>

<script src="../whatsapp/math-pages.js"></script>
<script src="../whatsapp/math-lessons.js"></script>
<script src="../whatsapp/math-upgrades.js"></script>
<script src="../whatsapp/math-visuals.js"></script>
<script src="instagram-app.js"></script>
</body>
</html>
