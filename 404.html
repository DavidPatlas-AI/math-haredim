<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="description" content="דף לא נמצא — הכנה למה״ט ולבגרות 3 יח״ל. מתמטיקה לחרדים.">
<link rel="stylesheet" href="/shared/style.css">
<script>try{if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark")}catch(e){}</script>
<link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#12142a"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="מת׳ לחרדים">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דף לא נמצא — מתמטיקה לחרדים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Frank+Ruhl+Libre:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Heebo',sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,130,10,.1),transparent 60%),
      #f4f6ff;
    color:#12142a;text-align:center;padding:24px;
  }
  .box{max-width:480px;width:100%}
  .num{
    font-family:'Frank Ruhl Libre',serif;font-size:7rem;font-weight:900;
    line-height:1;
    background:linear-gradient(135deg,#12142a 30%,#c9a227 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:8px;
  }
  .eq{font-size:1.1rem;color:#5a6080;margin-bottom:32px;font-weight:600}
  h1{font-family:'Frank Ruhl Libre',serif;font-size:1.9rem;font-weight:900;margin-bottom:12px}
  p{color:#5a6080;font-size:1rem;line-height:1.7;margin-bottom:32px}
  .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-primary{
    display:inline-flex;align-items:center;gap:8px;
    background:#12142a;color:#fff;text-decoration:none;
    padding:14px 28px;border-radius:50px;font-weight:800;font-size:1rem;
    box-shadow:0 6px 20px rgba(18,20,42,.2);transition:.2s;
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(18,20,42,.28)}
  .btn-sec{
    display:inline-flex;align-items:center;gap:8px;
    background:#fff;color:#12142a;text-decoration:none;
    padding:14px 24px;border-radius:50px;font-weight:700;font-size:.95rem;
    border:1.5px solid rgba(0,0,0,.12);box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.2s;
  }
  .btn-sec:hover{border-color:#c9a227;transform:translateY(-2px)}
  .math-float{
    position:fixed;inset:0;pointer-events:none;overflow:hidden;opacity:.04;
    font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;color:#12142a;
  }
  .math-float span{position:absolute;animation:fl 16s ease-in-out infinite}
  @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
</style>
</head>
<body>

<div class="math-float">
  <span style="top:8%;right:8%;animation-delay:-2s">x²</span>
  <span style="top:75%;left:6%;animation-delay:-5s">√16</span>
  <span style="top:20%;left:12%;animation-delay:-9s">sin θ</span>
  <span style="top:60%;right:14%;animation-delay:-3s">Δ</span>
  <span style="top:40%;right:4%;animation-delay:-7s">π</span>
  <span style="top:85%;right:30%;animation-delay:-1s">∞</span>
</div>

<div class="box">
  <div class="num">404</div>
  <div class="eq">שגיאה = דף × לא נמצא</div>
  <h1>אופס — הדף לא קיים</h1>
  <p>ייתכן שהלינק שגוי, הדף הוסר, או שהכתובת שגויה.<br>חזרו לעמוד הראשי ומצאו את מה שחיפשתם.</p>
  <div class="btns">
    <a class="btn-primary" href="/">🏠 חזרה לעמוד הראשי</a>
    <a class="btn-sec" href="/learn/">📚 מרכז הלמידה</a>
  </div>
</div>

<script src="/shared/nav.js"></script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}</script>
</body>
</html>
